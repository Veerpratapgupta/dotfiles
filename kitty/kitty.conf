# Font
font_family      JetBrainsMono Nerd Font
font_size        12.0

# Transparency
background_opacity 0.85

# Colors (Catppuccin Mocha - anime purple vibes)
foreground              #CDD6F4
background              #1E1E2E
selection_background    #313244
selection_foreground    #CDD6F4

# Black
color0  #45475A
color8  #585B70

# Red
color1  #F38BA8
color9  #F38BA8

# Green
color2  #A6E3A1
color10 #A6E3A1

# Yellow
color3  #F9E2AF
color11 #F9E2AF

# Blue
color4  #89B4FA
color12 #89B4FA

# Magenta
color5  #CBA4F7
color13 #CBA4F7

# Cyan
color6  #94E2D5
color14 #94E2D5

# White
color7  #BAC2DE
color15 #A6ADC8

# Cursor
cursor           #F5E0DC
cursor_text_color #1E1E2E

# Window
window_padding_width 10
remember_window_size yes

# Tab bar
tab_bar_style powerline
tab_powerline_style slanted
